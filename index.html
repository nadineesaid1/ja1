<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List Web App</title>
    <style>
        :root {
    --bg: #e0f2fe;
    --card: #b3e5fc;
    --text: #041837;
    --muted: #3e4c53;
    --accent: #518bbeca;
    --success: #4caf50;
    --danger: #ef5350;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #9ad7ef 10%, #4683b4ba 88%);
    color: var(--text);
}

.todo-app {
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 20px 60px;
}

.todo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 30px;
    animation: fadeIn 0.5s ease-out;
}

.todo-header h1 {
    margin: 0;
    font-size: clamp(2rem, 3vw, 3rem);
}

.todo-header p {
    margin: 8px 0 0;
    color: var(--muted);
    max-width: 420px;
}

.back-link {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    border: 1px solid transparent;
    padding: 10px 14px;
    border-radius: 999px;
    transition: background 0.2s ease, border-color 0.2s ease;
}

.back-link:hover {
    background: rgba(227, 144, 75, 0.12);
    border-color: rgba(222, 158, 102, 0.3);
}

.todo-panel {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
    animation: slideIn 0.5s ease-out;
}

.todo-form {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    margin-bottom: 24px;
}

.todo-form input {
    width: 100%;
    padding: 16px 18px;
    font-size: 1rem;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--text);
}

.todo-form input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(88, 166, 255, 0.12);
}

.todo-form button {
    border: none;
    background: var(--accent);
    color: #0b1018;
    font-weight: 700;
    padding: 16px 20px;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.2s ease, filter 0.2s ease;
}

.todo-form button:hover {
    transform: translateY(-1px);
    filter: brightness(1.08);
}

.todo-stats {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    color: var(--muted);
    font-weight: 500;
}

.text-button {
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.95rem;
    padding: 0;
}

.text-button:hover {
    text-decoration: underline;
}

.todo-list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    gap: 12px;
}

.todo-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    animation: fadeIn 0.5s ease-in;
}

.todo-item.completed {
    opacity: 0.7;
}

.todo-item.completed .task-label {
    text-decoration: line-through;
}

.task-checkbox {
    width: 18px;
    height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
}

.task-label {
    margin: 0;
    color: var(--text);
}

.task-actions {
    display: flex;
    gap: 10px;
}

.task-button {
    border: none;
    background: rgba(255, 255, 255, 0.08);
    color: var(--muted);
    width: 38px;
    height: 38px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.8s ease;
}

.task-button:hover {
    background: rgba(66, 165, 245, 0.15);
}

.task-button.delete {
    color: var(--danger);
}

.empty-state {
    padding: 30px;
    text-align: center;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.03);
    color: var(--muted);
}


@media (max-width: 560px) {
    .todo-form {
        grid-template-columns: 1fr;
    }

    .todo-header {
        flex-direction: column;
        align-items: flex-start;
    }

    .todo-item {
        grid-template-columns: auto 1fr;
    }

    .task-actions {
        justify-content: flex-end;
        width: 100%;
    }
    span{
        font-weight:bold;
    }

}

    </style>
</head>
<body>
    <main class="todo-app">
        <header class="todo-header">
            <div>
                <h1>Jana's To Do List 🩵</h1>
                <p>Keep going, you're doing better than you think, and i'm really proud of you. <span>𝓵𝓸𝓿𝓮 𝔂𝓸𝓾 🤍</span></p>
            </div>
        </header>

        <section class="todo-panel">
            <form id="todo-form" class="todo-form">
                <input id="todo-input" type="text" placeholder="Add a new task..." aria-label="New task" autocomplete="off">
                <button type="submit">Add Task</button>
            </form>

            <div class="todo-stats">
                <span id="task-count">0 tasks</span>
                <button id="clear-completed" class="text-button">Clear completed</button>
            </div>

            <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
        </section>
    </main>

    <script>
        const todoForm = document.getElementById('todo-form');
const todoInput = document.getElementById('todo-input');
const todoList = document.getElementById('todo-list');
const taskCount = document.getElementById('task-count');
const clearCompletedButton = document.getElementById('clear-completed');

const STORAGE_KEY = 'todoApp.tasks';
let tasks = [];

function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function loadTasks() {
    const stored = localStorage.getItem(STORAGE_KEY);
    tasks = stored ? JSON.parse(stored) : [];
}

function updateTaskCount() {
    const remaining = tasks.filter(task => !task.completed).length;
    const total = tasks.length;
    taskCount.textContent = total === 0 ? 'No tasks yet' : `${remaining} of ${total} task${total === 1 ? '' : 's'} remaining`;
}

function createTaskItem(task) {
    const listItem = document.createElement('li');
    listItem.className = `todo-item${task.completed ? ' completed' : ''}`;
    listItem.dataset.id = task.id;

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.className = 'task-checkbox';
    checkbox.checked = task.completed;
    checkbox.addEventListener('change', () => toggleTask(task.id));

    const label = document.createElement('p');
    label.className = 'task-label';
    label.textContent = task.text;

    const actions = document.createElement('div');
    actions.className = 'task-actions';

    const deleteButton = document.createElement('button');
    deleteButton.className = 'task-button delete';
    deleteButton.textContent = '✕';
    deleteButton.setAttribute('aria-label', 'Delete task');
    deleteButton.addEventListener('click', () => removeTask(task.id));

    actions.appendChild(deleteButton);
    listItem.append(checkbox, label, actions);

    return listItem;
}

function renderTasks() {
    todoList.innerHTML = '';

    if (tasks.length === 0) {
        const emptyMessage = document.createElement('div');
        emptyMessage.className = 'empty-state';
        emptyMessage.textContent = 'Your todo list is empty. Add a new task to get started!';
        todoList.appendChild(emptyMessage);
        updateTaskCount();
        return;
    }

    tasks.forEach(task => todoList.appendChild(createTaskItem(task)));
    updateTaskCount();
}

function addTask(text) {
    const trimmed = text.trim();
    if (!trimmed) return;

    tasks.push({
        id: Date.now().toString(),
        text: trimmed,
        completed: false,
    });

    saveTasks();
    renderTasks();
    todoInput.value = '';
    todoInput.focus();
}

function toggleTask(id) {
    tasks = tasks.map(task => task.id === id ? { ...task, completed: !task.completed } : task);
    saveTasks();
    renderTasks();
}

function removeTask(id) {
    tasks = tasks.filter(task => task.id !== id);
    saveTasks();
    renderTasks();
}

function clearCompletedTasks() {
    tasks = tasks.filter(task => !task.completed);
    saveTasks();
    renderTasks();
}

todoForm.addEventListener('submit', event => {
    event.preventDefault();
    addTask(todoInput.value);
});

clearCompletedButton.addEventListener('click', clearCompletedTasks);

loadTasks();
renderTasks();

    </script>
</body>
</html>
